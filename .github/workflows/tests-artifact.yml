name: Tests + Artifacts

on:
  push:
    branches: [ main, master, work ]
  pull_request:
  workflow_dispatch:

jobs:
  test-and-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run tests and generate JUnit XML
        run: |
          mkdir -p .artifacts
          pytest -vv --junitxml .artifacts/pytest.xml

      - name: Generate markdown test report
        run: |
          python scripts/generate_test_report.py .artifacts/pytest.xml TEST_RESULTS.md

      - name: Debug files (important)
        run: |
          ls -la
          ls -la .artifacts
          wc -c .artifacts/pytest.xml TEST_RESULTS.md
          sed -n '1,40p' TEST_RESULTS.md

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            .artifacts/pytest.xml
            TEST_RESULTS.md
